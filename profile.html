<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Deportes Jódar</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./profile.js"></script>
    <style>
        body {
            opacity: 0;
            animation: fadeIn 0.4s ease-in forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body
    class="min-h-screen bg-[#fbfbfd] text-[#1d1d1f] font-sans selection:bg-blue-50 selection:text-[#0052cc] overflow-x-hidden p-6 sm:p-12">
    <div class="max-w-3xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <a href="./index.html"
                class="flex items-center gap-2 text-slate-500 hover:text-[#0052cc] transition-colors font-semibold text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                </svg>
                Volver al Inicio
            </a>
            <div class="text-[18px] font-extrabold tracking-[-0.8px] text-[#0052cc] font-display select-none">
                DEPORTES JÓDAR
            </div>
        </div>

        <div class="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm relative overflow-hidden">
            <!-- Decorator -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-50 rounded-full blur-3xl pointer-events-none">
            </div>

            <div class="flex items-start justify-between mb-8 border-b border-slate-100 pb-6 relative z-10">
                <div>
                    <h1 class="font-display font-extrabold text-2xl text-slate-900 mb-2">Ficha de Atleta</h1>
                    <p class="text-sm text-slate-500">Datos registrados en el sistema del patronato de deportes. Estos
                        campos no pueden modificarse libremente.</p>
                </div>
                <div id="profile-initials"
                    class="w-16 h-16 rounded-2xl bg-[#0052cc] text-white flex items-center justify-center font-display text-2xl shadow-md shrink-0">

                </div>
            </div>

            <div id="profile-content" class="space-y-8 relative z-10">
                <!-- Rendered by JS -->
            </div>

            <div class="mt-8 pt-6 border-t border-slate-100 flex items-center justify-between">
                <button id="btn-request-change"
                    class="px-5 py-3 text-sm font-semibold bg-slate-900 text-white rounded-xl hover:bg-slate-800 transition-colors shadow-sm cursor-pointer inline-flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Solicitar Modificación de Datos
                </button>
            </div>

        </div>
    </div>

    <!-- Modal for modification request -->
    <div id="request-modal"
        class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-slate-900/30 backdrop-blur-md">
        <div class="bg-white rounded-3xl p-6 sm:p-8 w-full max-w-md shadow-2xl relative">
            <button id="request-close"
                class="absolute top-5 right-5 text-slate-400 hover:text-slate-600 cursor-pointer">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <h3 class="font-display font-bold text-xl text-slate-900 mb-2">Solicitud de Cambio</h3>
            <p class="text-xs text-slate-500 mb-6">Describe qué datos deseas cambiar. Esto se enviará al área de
                secretaría.</p>

            <textarea id="request-text" rows="4"
                class="w-full bg-slate-50 border border-slate-150 rounded-xl px-4 py-2.5 text-xs text-slate-800 focus:outline-[#0052cc] resize-none mb-4"
                placeholder="Ej: Me gustaría actualizar mi fecha de nacimiento..."></textarea>

            <button id="request-submit"
                class="w-full bg-[#0052cc] text-white py-3 rounded-xl text-sm font-bold shadow-sm hover:opacity-95 transition-opacity">
                Enviar Petición
            </button>
        </div>
    </div>
</body>

</html>
